services:
core-service:
build: .
image: fastservices-core:latest
ports:
- "8080:8080"
environment:
- SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/fast_db
- SPRING_DATASOURCE_USERNAME=postgres
- SPRING_DATASOURCE_PASSWORD=admin
deploy:
# IE17: Escalabilidad, ajustando réplicas
replicas: 3
restart_policy:
condition: on-failure
depends_on:
- postgres-db

postgres-db:
image: postgres:15-alpine
environment:
- POSTGRES_DB=fast_db
- POSTGRES_USER=postgres
- POSTGRES_PASSWORD=admin
ports:
- "5432:5432"